<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5941</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #FBFFF2;
      --surface: #eaf4d0;
      --border:  rgba(0,142,107,0.22);
      --accent:  #008E6B;
      --accent2: #46B065;
      --text:    #003d2a;
      --muted:   #5a8060;
      --danger:  #c0392b;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 25%, rgba(129,197,112,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 75%, rgba(0,142,107,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 70% 70% at 50% 50%, rgba(220,236,181,0.4) 0%, transparent 70%);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,142,107,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,142,107,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    header { margin-bottom: 56px; }

    .logo-tag {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(0,142,107,0.1);
      border: 1px solid rgba(0,142,107,0.3);
      display: inline-block;
      padding: 4px 12px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-weight: 300;
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px;
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.9rem;
      line-height: 1.8;
      padding: 16px;
      resize: vertical;
      min-height: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .num-row {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 20px;
    }

    .num-label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
      margin-right: 12px;
    }

    .num-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .num-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    #teamCount {
      background: var(--bg);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-left: none;
      border-right: none;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      width: 60px;
      height: 40px;
      text-align: center;
      outline: none;
    }

    #teamCount::-webkit-inner-spin-button,
    #teamCount::-webkit-outer-spin-button { -webkit-appearance: none; }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px 16px;
      flex: 1;
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    .btn-go {
      margin-top: 24px;
      width: 100%;
      background: var(--accent);
      color: #FBFFF2;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-go:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,142,107,0.3);
    }

    .btn-go:active { transform: translateY(0); }

    .btn-go:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-go .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 8px;
      min-height: 18px;
    }

    /* Result section */
    #resultSection {
      margin-top: 40px;
      display: none;
    }

    #resultSection.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Save badge */
    .save-badge {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .save-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 640px) {
      .teams-grid { grid-template-columns: 1fr; }
    }

    .team-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      animation: cardIn 0.4s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .team-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team-dot { width: 8px; height: 8px; flex-shrink: 0; }

    .member-list { list-style: none; }

    .member-item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(0,100,60,0.1);
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeIn 0.3s ease both;
    }

    .member-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .member-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      color: var(--muted);
      width: 16px;
      flex-shrink: 0;
    }

    /* Saved time tag */
    .saved-time {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Team color palette */
    .c0 { color: #008E6B; }
    .c1 { color: #46B065; }
    .c2 { color: #2e7d52; }
    .c3 { color: #81C570; }
    .c4 { color: #005c45; }
    .c5 { color: #3a9e60; }
    .c6 { color: #6ab85a; }
    .c7 { color: #007a58; }

    .bg0 { background: rgba(  0,142,107,0.12); border-color: rgba(  0,142,107,0.3); }
    .bg1 { background: rgba( 70,176,101,0.12); border-color: rgba( 70,176,101,0.3); }
    .bg2 { background: rgba( 46,125, 82,0.1);  border-color: rgba( 46,125, 82,0.28); }
    .bg3 { background: rgba(129,197,112,0.15); border-color: rgba(129,197,112,0.35); }
    .bg4 { background: rgba(  0, 92, 69,0.1);  border-color: rgba(  0, 92, 69,0.28); }
    .bg5 { background: rgba( 58,158, 96,0.1);  border-color: rgba( 58,158, 96,0.28); }
    .bg6 { background: rgba(106,184, 90,0.12); border-color: rgba(106,184, 90,0.3); }
    .bg7 { background: rgba(  0,122, 88,0.1);  border-color: rgba(  0,122, 88,0.28); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-tag">解释权归似绎所有</div>
    <h1>随机分队</h1>
    <p class="subtitle">输入参赛人名，随机平均分配到 N 支队伍</p>
  </header>

  <div class="layout">
    <div class="panel">
      <div class="panel-title">参赛人员</div>
      <textarea id="namesInput" placeholder="每行输入一个名字"></textarea>
      <p class="hint">每行一个名字，空行会自动忽略</p>
    </div>

    <div class="panel">
      <div class="panel-title">分队设置</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="nameCount">0</div>
          <div class="stat-label">参赛人数</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="perTeam">—</div>
          <div class="stat-label">每队人数</div>
        </div>
      </div>

      <div class="num-row">
        <span class="num-label">队伍数量</span>
        <button class="num-btn" id="btnMinus">−</button>
        <input type="number" id="teamCount" value="2" min="2" max="20" />
        <button class="num-btn" id="btnPlus">+</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="btn-go" id="btnShuffle" disabled>
        <div class="btn-inner">随机分队</div>
      </button>
    </div>
  </div>

  <div id="resultSection">
    <div class="result-header">
      <div>
        <div class="result-title">分队结果</div>
        <div class="saved-time" id="savedTime"></div>
      </div>
      <div class="result-actions">
        <div class="save-badge"><div class="save-dot"></div>已自动保存</div>
        <button class="btn-reset" id="btnReShuffle">重新随机</button>
        <button class="btn-reset" id="btnClear">清除记录</button>
      </div>
    </div>
    <div class="teams-grid" id="teamsGrid"></div>
  </div>
</div>

<div style="text-align:center;padding:20px 0 8px;font-size:11px;color:var(--muted);font-family:system-ui,sans-serif;border-top:1px solid var(--border);margin-top:24px;width:100%;">
  <div style="margin-bottom:4px;">
    <a href="https://github.com/Udocen-41/game_qqspeed_funny_race" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:600;">
      qq飞车手游组队娱乐赛HTML脚本
    </a>
  </div>
  <div style="opacity:0.7;">
    作者：似绎（redbook:a4141111）· 开源协议 MIT License
  </div>
</div>

<script>
  const namesInput    = document.getElementById('namesInput');
  const teamCountEl   = document.getElementById('teamCount');
  const nameCountEl   = document.getElementById('nameCount');
  const perTeamEl     = document.getElementById('perTeam');
  const btnShuffle    = document.getElementById('btnShuffle');
  const btnReShuffle  = document.getElementById('btnReShuffle');
  const btnClear      = document.getElementById('btnClear');
  const btnMinus      = document.getElementById('btnMinus');
  const btnPlus       = document.getElementById('btnPlus');
  const errorMsg      = document.getElementById('errorMsg');
  const resultSection = document.getElementById('resultSection');
  const teamsGrid     = document.getElementById('teamsGrid');
  const savedTime     = document.getElementById('savedTime');

  const LS_KEY = 'team_randomizer_v1';

  // ── localStorage ──────────────────────────────────────────────────────────
  function saveState(teams) {
    const data = {
      names:     namesInput.value,
      teamCount: getTeamCount(),
      teams:     teams,
      savedAt:   Date.now()
    };
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }

  function clearState() {
    localStorage.removeItem(LS_KEY);
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `上次保存：${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function getNames() {
    return namesInput.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
  }

  function getTeamCount() {
    return Math.max(2, Math.min(20, parseInt(teamCountEl.value) || 2));
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function colorIdx(i) { return i % 8; }

  // ── Update UI state ───────────────────────────────────────────────────────
  function updateStats() {
    const names = getNames();
    const n     = names.length;
    const teams = getTeamCount();

    nameCountEl.textContent = n;
    errorMsg.textContent = '';

    if (n === 0) {
      perTeamEl.textContent = '—';
      btnShuffle.disabled = true;
      return;
    }
    if (n < teams) {
      errorMsg.textContent = `人数(${n})不能少于队伍数(${teams})`;
      perTeamEl.textContent = '—';
      btnShuffle.disabled = true;
      return;
    }

    const base   = Math.floor(n / teams);
    const extras = n % teams;
    perTeamEl.textContent = extras === 0 ? `${base}` : `${base}~${base+1}`;
    btnShuffle.disabled = false;
  }

  // ── Distribute ────────────────────────────────────────────────────────────
  function distribute(names, teamCount) {
    const shuffled = shuffle(names);
    const teams = Array.from({ length: teamCount }, () => []);
    shuffled.forEach((name, i) => teams[i % teamCount].push(name));
    return teams;
  }

  // ── Render result ─────────────────────────────────────────────────────────
  function renderTeams(teams, ts) {
    teamsGrid.innerHTML = '';
    teams.forEach((members, i) => {
      const ci   = colorIdx(i);
      const card = document.createElement('div');
      card.className = `team-card bg${ci}`;
      card.style.animationDelay = `${i * 60}ms`;

      const label = document.createElement('div');
      label.className = `team-label c${ci}`;
      label.innerHTML = `<svg class="team-dot" viewBox="0 0 8 8"><rect width="8" height="8" fill="currentColor"/></svg>队伍 ${i + 1} <span style="color:var(--muted);font-weight:400">(${members.length}人)</span>`;

      const ul = document.createElement('ul');
      ul.className = 'member-list';

      members.forEach((name, j) => {
        const li = document.createElement('li');
        li.className = 'member-item';
        li.style.animationDelay = `${i * 60 + j * 40}ms`;
        li.innerHTML = `<span class="member-num">${j + 1}</span>${name}`;
        ul.appendChild(li);
      });

      card.appendChild(label);
      card.appendChild(ul);
      teamsGrid.appendChild(card);
    });

    if (ts) savedTime.textContent = formatTime(ts);
    resultSection.classList.add('visible');
  }

  // ── Events ────────────────────────────────────────────────────────────────
  namesInput.addEventListener('input', updateStats);

  teamCountEl.addEventListener('input', () => {
    let v = Math.max(2, Math.min(20, parseInt(teamCountEl.value) || 2));
    teamCountEl.value = v;
    updateStats();
  });

  btnMinus.addEventListener('click', () => {
    teamCountEl.value = Math.max(2, getTeamCount() - 1);
    updateStats();
  });

  btnPlus.addEventListener('click', () => {
    teamCountEl.value = Math.min(20, getTeamCount() + 1);
    updateStats();
  });

  btnShuffle.addEventListener('click', () => {
    const names = getNames();
    const count = getTeamCount();
    if (names.length < count) return;
    const teams = distribute(names, count);
    const now   = Date.now();
    saveState(teams);
    renderTeams(teams, now);
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  btnReShuffle.addEventListener('click', () => {
    const names = getNames();
    const count = getTeamCount();
    if (names.length < count) return;
    const teams = distribute(names, count);
    const now   = Date.now();
    saveState(teams);
    renderTeams(teams, now);
  });

  btnClear.addEventListener('click', () => {
    clearState();
    resultSection.classList.remove('visible');
    savedTime.textContent = '';
    teamsGrid.innerHTML = '';
  });

  // ── Restore on load ───────────────────────────────────────────────────────
  const saved = loadState();
  if (saved) {
    namesInput.value  = saved.names || '';
    teamCountEl.value = saved.teamCount || 2;
    updateStats();
    renderTeams(saved.teams, saved.savedAt);
  } else {
    updateStats();
  }
</script>
</body>
</html>
